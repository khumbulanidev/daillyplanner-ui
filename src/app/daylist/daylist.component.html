<div class="app-list-container">
    <div class="button-container">
        <button class="btnAddDay"><i class="fa-solid fa-plus"></i></button>
    </div>


<div class="material-table-container">
<table mat-table [dataSource]="dataSource" >
    <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>Id </th>
        <td mat-cell *matCellDef="let day"> {{day.id}} </td>
      </ng-container>
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>Date </th>
        <td mat-cell *matCellDef="let day"> {{day.date}} </td>
      </ng-container>
      <ng-container matColumnDef="numberOfTasks">
        <th mat-header-cell *matHeaderCellDef># of tasks </th>
        <td mat-cell *matCellDef="let day"> {{day.numberOfTasks}} </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr> 
      <tr mat-row *matRowDef="let days; columns:columnsToDisplay"></tr>
</table>
</div>
</div>
