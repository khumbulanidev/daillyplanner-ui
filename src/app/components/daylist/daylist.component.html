<div class="app-list-container">
      <div class="button-container">
         <span class="ep--circle-plus btnAddDay" (click)="addDay()"></span> 
    </div>

    <p-table [value]="dayList" [tableStyle]="{ 'min-width': '70vw' }" 
     styleClass="p-datatable-gridlines p-datatable-striped" 
     [paginator]="true"
     [rows]="10"
     [rowsPerPageOptions]="[10, 20,50,100]"
     class="prime-table"
     >
      <ng-template pTemplate="header">
          <tr>
              <th pSortableColumn="id" style="width:30%">Id <p-sortIcon field="id" /></th>
              <th  pSortableColumn="date" style="width:30%">Date <p-sortIcon field="date" /></th>
              <th pSortableColumn="numberOfTasks" style="width:30%"># of tasks <p-sortIcon field="numberOfTasks" /></th>
              <th>Tasks</th>
              <th>View</th>
              <th>Delete</th>
          </tr>
      </ng-template>
      <ng-template pTemplate="body" let-day>
          <tr>
              <td>{{ day.id }}</td>
              <td>{{ day.date }}</td>
              <td>{{ day.numberOfTasks }}</td>
              <td class="center"><i class="fa-solid fa-list-check" (click)="taskList(day.date)"></i></td>
              <td class="center"><i class="fa-regular fa-eye view" (click)="viewDay(day.id, day.date)"></i></td>
              <td class="center"><i class="fa-solid fa-trash delete" (click)="deleteDate(day.id)"></i> </td>
          </tr>
      </ng-template>
  </p-table>
<div class="material-table-container">


</div>
</div>

<app-popup-modal (hideModal)="closeModal($event)" [message]="deleteMsg" [id]="id" #popupModal [ngClass]="showModal  ? 'showPopupModal': 'hidePopupModal'"></app-popup-modal>

<app-toast (closePopupEvent)="closeToast()"  [toastMessage]="toastMsg"  [ngClass]="isToastVisible ? isGreen ? 'show-toast green-toast' : 'show-toast red-toast' : 'hide-toast' "></app-toast>
