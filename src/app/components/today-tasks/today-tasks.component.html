
<div class="task-list-container">
    <div class="date-container">
          {{taskDayHeading}}
    </div>
    <div class="button-container">
         <span class="ep--circle-plus btnAddDay" (click)="addTask()"></span> 
    </div>

    <p-table [value]="taskList" [tableStyle]="{ 'min-width': '70vw' }" 
    styleClass="p-datatable-gridlines p-datatable-striped" 
     [paginator]="true"
     [rows]="10"
     [rowsPerPageOptions]="[10, 20, 50, 100]"
     class="prime-table"
     >
      <ng-template pTemplate="header">
          <tr>
              <th pSortableColumn="id" style="width:5%">Id <p-sortIcon field="id" /></th>
               <th  pSortableColumn="name" style="width:20%">Name <p-sortIcon field="name" /></th>
              <th  pSortableColumn="duration" style="width:10%">Duration <p-sortIcon field="duration" /></th>
              <th pSortableColumn="comments" style="width:55%">Comments<p-sortIcon field="comments" /></th>
              <th pSortableColumn="isDone" style="width:5%">Done</th>
             
              <th pSortableColumn="dayId" style="width:5%">Day Id</th>
              <th>View</th>
              <th>Delete</th>
          </tr>
      </ng-template>
      <ng-template pTemplate="body" let-task>
          <tr>
              <td>{{ task.id }}</td>
              <td>{{ task.name }}</td>
              <td>{{ task.duration }}</td>
              <td>{{ task.comments }}</td>
             
              <td>{{ task.done | donePipe}}</td> 
              <td>{{ task.dayId}}</td> 
             <td class="center icons"><i class="fa-regular fa-eye view" (click)="viewTask(task.id)"></i></td> 
            
              <td class="center icons"><i class="fa-solid fa-trash delete" (click)="openConfirmation(task.id)"></i> </td>
       </tr>
      </ng-template>
 </p-table> 
<div class="material-table-container">


</div>
</div>

<app-popup-modal (hideModal)="closeModal($event)" (deleteEvent)="deleteTask($event)" [message]="msg" [id]="taskId" #popupModal [ngClass]="showModal  ? 'showPopupModal': 'hidePopupModal'"></app-popup-modal>
